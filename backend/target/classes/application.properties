spring.application.name=leave-management-system

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/leave-management-db;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# JWT Configuration
jwt.secret=lms_super_secret_key_that_is_at_least_256_bits_long_for_hs256_algorithm_2024
jwt.expiration=86400000

# Email Notifications
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from-address=${APP_MAIL_FROM:no-reply@lms.local}
app.mail.from-name=${APP_MAIL_FROM_NAME:Leave Management System}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:5000}

# Logging
logging.level.com.lms=DEBUG
logging.level.org.springframework.security=DEBUG
