<div class="min-h-screen bg-gray-50 py-8 md:py-10">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="mb-6">
      <a [routerLink]="dashboardRoute" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Dashboard
      </a>
      <h1 class="text-2xl font-bold text-gray-900 mt-2">Apply for Leave</h1>
      <p class="text-gray-500">Fill in the details below to submit a leave request</p>
    </div>

    <!-- Success -->
    <div *ngIf="success" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg flex items-center gap-2">
      <svg class="w-5 h-5 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>
      </svg>
      <p class="text-sm text-green-700 font-medium">{{ success }}</p>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
      <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
      </svg>
      <p class="text-sm text-red-700">{{ error }}</p>
    </div>

    <div class="card">
      <form (ngSubmit)="onSubmit()" #leaveForm="ngForm">
        <div class="space-y-5">

          <!-- Leave Type -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Leave Type <span class="text-red-500">*</span>
            </label>
            <select [(ngModel)]="leaveType" name="leaveType" required class="input-field">
              <option *ngFor="let type of leaveTypes" [value]="type">{{ type }}</option>
            </select>
          </div>

          <!-- ✅ UPDATED DATE PICKER -->
          <div class="grid grid-cols-2 gap-4">

            <!-- Start Date -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                Start Date <span class="text-red-500">*</span>
              </label>
              <input
                      type="date"
                      [(ngModel)]="startDate"
                      name="startDate"
                      required
                      [min]="today"
                      (change)="calculateDays()"
                      class="input-field cursor-pointer"
                      onkeydown="return false"
              />
            </div>

            <!-- End Date -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                End Date <span class="text-red-500">*</span>
              </label>
              <input
                      type="date"
                      [(ngModel)]="endDate"
                      name="endDate"
                      required
                      [min]="startDate || today"
                      (change)="calculateDays()"
                      class="input-field cursor-pointer"
                      onkeydown="return false"
              />
            </div>

          </div>

          <!-- Days Preview -->
          <div *ngIf="numberOfDays > 0"
               class="flex items-center gap-2 p-3 bg-blue-50 border border-blue-200 rounded-lg">
            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-sm text-blue-700">
              You are requesting <strong>{{ numberOfDays }} day{{ numberOfDays > 1 ? 's' : '' }}</strong> of leave.
            </p>
          </div>

          <!-- Reason -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Reason <span class="text-red-500">*</span>
            </label>
            <textarea [(ngModel)]="reason" name="reason" required rows="4"
                      class="input-field resize-none"
                      placeholder="Please describe the reason for your leave..."></textarea>
            <p class="text-xs text-gray-400 mt-1">{{ reason.length }}/500 characters</p>
          </div>

          <!-- Actions -->
          <div class="flex items-center gap-3 pt-2">
            <button type="submit" [disabled]="loading" class="btn-primary flex items-center gap-2">
              <svg *ngIf="!loading" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
              <svg *ngIf="loading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              {{ loading ? 'Submitting...' : 'Submit Request' }}
            </button>

            <button type="button" (click)="resetForm()" class="btn-secondary">
              Clear
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>
</div>
