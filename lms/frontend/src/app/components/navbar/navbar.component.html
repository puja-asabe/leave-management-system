<nav class="bg-blue-700 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center space-x-3">
        <div class="bg-white rounded-lg p-1.5">
          <svg class="w-6 h-6 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <span class="font-bold text-lg">LeaveMS</span>
      </div>

      <!-- Desktop Nav Links -->
      <div class="hidden md:flex items-center space-x-1">
        <!-- Employee Links -->
        <ng-container *ngIf="authService.isEmployee()">
          <a routerLink="/employee/dashboard" routerLinkActive="bg-blue-800"
             class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-600 transition-colors">Dashboard</a>
          <a routerLink="/employee/apply-leave" routerLinkActive="bg-blue-800"
             class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-600 transition-colors">Apply Leave</a>
          <a routerLink="/employee/my-leaves" routerLinkActive="bg-blue-800"
             class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-600 transition-colors">My Leaves</a>
          <a routerLink="/employee/leave-balance" routerLinkActive="bg-blue-800"
             class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-600 transition-colors">Balance</a>
        </ng-container>

        <!-- Manager Links -->
        <ng-container *ngIf="authService.isManager()">
          <a routerLink="/manager/dashboard" routerLinkActive="bg-blue-800"
             class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-600 transition-colors">Dashboard</a>
          <a routerLink="/manager/team-leaves" routerLinkActive="bg-blue-800"
             class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-600 transition-colors">Team Leaves</a>
        </ng-container>
      </div>

      <!-- User info + Logout -->
      <div class="hidden md:flex items-center space-x-3">
        <div class="text-right">
          <p class="text-sm font-semibold">{{ user?.name }}</p>
          <p class="text-xs text-blue-200">{{ user?.role }} · {{ user?.department }}</p>
        </div>
        <button (click)="logout()"
          class="bg-blue-800 hover:bg-blue-900 px-3 py-2 rounded-md text-sm font-medium transition-colors">
          Logout
        </button>
      </div>

      <!-- Mobile menu button -->
      <button (click)="toggleMenu()" class="md:hidden p-2 rounded-md hover:bg-blue-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="menuOpen" class="md:hidden border-t border-blue-600 py-2 px-4 space-y-1">
    <ng-container *ngIf="authService.isEmployee()">
      <a routerLink="/employee/dashboard" (click)="menuOpen=false" class="block px-3 py-2 rounded-md text-sm hover:bg-blue-600">Dashboard</a>
      <a routerLink="/employee/apply-leave" (click)="menuOpen=false" class="block px-3 py-2 rounded-md text-sm hover:bg-blue-600">Apply Leave</a>
      <a routerLink="/employee/my-leaves" (click)="menuOpen=false" class="block px-3 py-2 rounded-md text-sm hover:bg-blue-600">My Leaves</a>
      <a routerLink="/employee/leave-balance" (click)="menuOpen=false" class="block px-3 py-2 rounded-md text-sm hover:bg-blue-600">Balance</a>
    </ng-container>
    <ng-container *ngIf="authService.isManager()">
      <a routerLink="/manager/dashboard" (click)="menuOpen=false" class="block px-3 py-2 rounded-md text-sm hover:bg-blue-600">Dashboard</a>
      <a routerLink="/manager/team-leaves" (click)="menuOpen=false" class="block px-3 py-2 rounded-md text-sm hover:bg-blue-600">Team Leaves</a>
    </ng-container>
    <div class="pt-2 border-t border-blue-600">
      <p class="text-sm font-semibold">{{ user?.name }}</p>
      <p class="text-xs text-blue-200 mb-2">{{ user?.role }}</p>
      <button (click)="logout()" class="w-full text-left px-3 py-2 rounded-md text-sm hover:bg-blue-600">Logout</button>
    </div>
  </div>
</nav>
